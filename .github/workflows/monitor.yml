name: CPUC Meeting Monitor

# Runs the monitor on a schedule. monitor.py self-gates: it decides whether a
# check is actually "due" based on config.json dates and last_seen.json, so an
# hourly trigger is enough to satisfy every cadence (daily / 3-hour / hourly).
on:
  schedule:
    # Every 5 minutes (GitHub's minimum; busy runs may be delayed). monitor.py
    # self-gates, so it only actually hits CPUC on its own cadence — every 5 min
    # in the day 8-15 agenda peak zone, less often otherwise. Free on a PUBLIC repo.
    - cron: "*/5 * * * *"
  workflow_dispatch:       # lets you run it manually from the Actions tab
    inputs:
      test_email:
        description: "Send a test email to confirm delivery works (skips monitoring)"
        type: boolean
        default: false

# Allow the job to push the updated state/log back to the repo.
permissions:
  contents: write

# Never run two copies at once (they would fight over committing state).
concurrency:
  group: cpuc-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          YAHOO_EMAIL: ${{ secrets.YAHOO_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          TEST_EMAIL: ${{ inputs.test_email }}
        run: python monitor.py

      - name: Commit updated state and log
        if: always()   # persist state even if the run logged an error
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_seen.json monitor.log
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update monitor state [skip ci]"
            git push
          fi
